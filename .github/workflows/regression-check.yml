name: LLM Regression Check

on:
  push:
    branches: [main]
    paths:
      - "golden_datasets/**"
      - "config.yaml"
      - "src/**"
      - ".github/workflows/regression-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "golden_datasets/**"
      - "config.yaml"
      - "src/**"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Force-update baselines after run"
        type: boolean
        default: false

permissions:
  contents: write   # needed to commit updated baselines on main
  pull-requests: write

jobs:
  regression-check:
    name: Evaluate & detect regressions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so baseline commits can be compared
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MRDS
        run: pip install -e ".[dev]"

      - name: Restore baselines cache
        uses: actions/cache@v4
        with:
          path: baselines/
          key: baselines-${{ hashFiles('config.yaml') }}
          restore-keys: baselines-

      - name: Run regression check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          mrds run \
            --config config.yaml \
            --report regression_report.json \
            ${{ github.event.inputs.update_baseline == 'true' && '--update-baseline' || '' }}

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: regression_report*.json

      - name: Commit updated baselines (main branch only)
        if: |
          github.ref == 'refs/heads/main' &&
          github.event.inputs.update_baseline == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines/
          git diff --cached --quiet || git commit -m "chore: update LLM baselines [skip ci]"
          git push

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
